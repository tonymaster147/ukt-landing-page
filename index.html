<!DOCTYPE html>

  <head>
    <meta charset="utf-8" />

    <title>Professional Translation Services UK | Best Translation Agency</title>
    <!-- Self-hosted Poppins — preload the LCP heading weight for a fast first paint. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/poppins-700.woff2"
      crossorigin
    />

    <!-- Google Tag Manager (data layer initialised early; the container loads deferred below) -->
    <script>
      window.dataLayer = window.dataLayer || [];
    </script>

    <!--
      Third-party scripts (Google Tag Manager, LiveChat, Clarity, Clicky) are loaded AFTER
      the page renders — on first user interaction or shortly after load — so they don't
      block LCP/FCP. They still load for essentially every real session.
    -->
    <script>
      (function () {
        var loaded = false;
        function loadThirdParty() {
          if (loaded) return;
          loaded = true;

          /* Google Tag Manager */
          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
          var gtm = document.createElement('script');
          gtm.async = true;
          gtm.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-5H2BZD6L';
          document.head.appendChild(gtm);

          /* Google Ads (gtag.js) */
          window.gtag = window.gtag || function () { dataLayer.push(arguments); };
          var gt = document.createElement('script');
          gt.async = true;
          gt.src = 'https://www.googletagmanager.com/gtag/js?id=AW-17477274320';
          document.head.appendChild(gt);
          gtag('js', new Date());
          gtag('config', 'AW-17477274320');

          /* Microsoft Clarity */
          (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = 'https://www.clarity.ms/tag/' + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
          })(window, document, 'clarity', 'script', 'd9haspp1pr');

          /* Clicky */
          var cl = document.createElement('script');
          cl.async = true;
          cl.src = '//static.getclicky.com/101376639.js';
          document.body.appendChild(cl);

          /* LiveChat */
          window.__lc = window.__lc || {};
          window.__lc.license = 3946801;
          var lc = document.createElement('script');
          lc.async = true;
          lc.src = 'https://cdn.livechatinc.com/tracking.js';
          document.head.appendChild(lc);
        }

        var evts = ['scroll', 'mousemove', 'touchstart', 'click', 'keydown'];
        function onFirst() {
          loadThirdParty();
          evts.forEach(function (e) { window.removeEventListener(e, onFirst); });
        }
        evts.forEach(function (e) { window.addEventListener(e, onFirst, { passive: true }); });

        // Fallbacks so non-interacting sessions still get tracked.
        setTimeout(loadThirdParty, 3500);
        window.addEventListener('load', function () { setTimeout(loadThirdParty, 2500); });
      })();
    </script>

  </head>
